services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinic_time}
      POSTGRES_USER: ${POSTGRES_USER:-clinic_time_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-clinic_time_user} -d ${POSTGRES_DB:-clinic_time}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: lambki/time-and-attendance-backend
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-clinic_time_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clinic_time}}
      COOKIE_SECURE: "true"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    restart: unless-stopped

  frontend:
    image: lambki/time-and-attendance-frontend
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
    expose:
      - "3000"
    depends_on:
      - backend
    command: sh -c "npm run build && npm start"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    env_file:
      - .env
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
