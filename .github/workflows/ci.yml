name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: clinic_time
          POSTGRES_USER: clinic_time_user
          POSTGRES_PASSWORD: change_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinic_time_user -d clinic_time"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg://clinic_time_user:change_me@localhost:5432/clinic_time
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -e ".[dev]"

      - name: Create test database
        run: PGPASSWORD=change_me psql -h localhost -U clinic_time_user -d clinic_time -c "CREATE DATABASE clinic_time_test;"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: pytest

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy app

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
